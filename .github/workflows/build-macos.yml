name: Build macOS (Universal – Apple Silicon + Intel)

# Produces an unsigned universal .app bundle (arm64 + amd64) that runs
# natively on both Apple Silicon and Intel Macs. Code signing / notarisation
# are intentionally omitted here; add your own signing step if needed.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. v2.1.7). Defaults to git describe.'
        required: false
        default: ''

env:
  WAILS_VERSION: v2.0.0-alpha.74
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

# ─── shared version helper ────────────────────────────────────────────────────
# Each job calls this logic because composite actions are not used here.
# Output: steps.version.outputs.version

jobs:
  # ── 1. Native arm64 build (Apple Silicon) ───────────────────────────────────
  build-arm64:
    name: Build arm64 (Apple Silicon)
    runs-on: macos-14   # GitHub's M1/M2 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo dev-$(git rev-parse --short HEAD))"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: $V"

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Write .version file
        run: printf '%s' "${{ steps.version.outputs.version }}" > app/.version

      - name: Generate Info.plist
        working-directory: app
        run: |
          V="${{ steps.version.outputs.version }}"
          sed "s/0\.0\.0/${V}/g" build/darwin/Info.plist.src > build/darwin/Info.plist

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install --legacy-peer-deps

      - name: Build (darwin/arm64)
        working-directory: app
        env:
          # arm64 requires macOS 11.0+
          CGO_LDFLAGS: "-mmacosx-version-min=11.0"
          GOARCH: arm64
        run: wails build -o xbar

      - name: Verify architecture
        run: |
          BIN="app/build/bin/xbar.app/Contents/MacOS/xbar"
          echo "arch check:"
          lipo -info "$BIN" || file "$BIN"

      - name: Archive arm64 binary
        run: |
          cp app/build/bin/xbar.app/Contents/MacOS/xbar /tmp/xbar-arm64
          chmod +x /tmp/xbar-arm64

      - name: Upload arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: xbar-binary-arm64
          path: /tmp/xbar-arm64
          retention-days: 1

      - name: Archive app bundle (for reuse in packaging job)
        run: |
          cd app/build/bin
          tar -czf /tmp/xbar-app-bundle.tar.gz xbar.app

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: xbar-app-bundle
          path: /tmp/xbar-app-bundle.tar.gz
          retention-days: 1

  # ── 2. Native amd64 build (Intel) ───────────────────────────────────────────
  build-amd64:
    name: Build amd64 (Intel)
    runs-on: macos-13   # GitHub's last Intel runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo dev-$(git rev-parse --short HEAD))"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: $V"

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Write .version file
        run: printf '%s' "${{ steps.version.outputs.version }}" > app/.version

      - name: Generate Info.plist
        working-directory: app
        run: |
          V="${{ steps.version.outputs.version }}"
          sed "s/0\.0\.0/${V}/g" build/darwin/Info.plist.src > build/darwin/Info.plist

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install --legacy-peer-deps

      - name: Build (darwin/amd64)
        working-directory: app
        env:
          CGO_LDFLAGS: "-mmacosx-version-min=10.13"
          GOARCH: amd64
        run: wails build -o xbar

      - name: Verify architecture
        run: |
          BIN="app/build/bin/xbar.app/Contents/MacOS/xbar"
          echo "arch check:"
          lipo -info "$BIN" || file "$BIN"

      - name: Archive amd64 binary
        run: |
          cp app/build/bin/xbar.app/Contents/MacOS/xbar /tmp/xbar-amd64
          chmod +x /tmp/xbar-amd64

      - name: Upload amd64 binary
        uses: actions/upload-artifact@v4
        with:
          name: xbar-binary-amd64
          path: /tmp/xbar-amd64
          retention-days: 1

  # ── 3. Package universal binary ─────────────────────────────────────────────
  package-universal:
    name: Package universal binary
    needs: [build-arm64, build-amd64]
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            V="$(git describe --tags --always --dirty 2>/dev/null || echo dev-$(git rev-parse --short HEAD))"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: xbar-binary-arm64
          path: /tmp/bins/

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: xbar-binary-amd64
          path: /tmp/bins/

      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: xbar-app-bundle
          path: /tmp/

      - name: Restore app bundle
        run: |
          cd /tmp
          tar -xzf xbar-app-bundle.tar.gz

      - name: Create universal binary with lipo
        run: |
          chmod +x /tmp/bins/xbar-arm64 /tmp/bins/xbar-amd64
          lipo -create \
            /tmp/bins/xbar-arm64 \
            /tmp/bins/xbar-amd64 \
            -output /tmp/xbar.app/Contents/MacOS/xbar
          chmod +x /tmp/xbar.app/Contents/MacOS/xbar

      - name: Verify universal binary
        run: |
          echo "=== lipo info ==="
          lipo -info /tmp/xbar.app/Contents/MacOS/xbar
          echo "=== file info ==="
          file /tmp/xbar.app/Contents/MacOS/xbar

      - name: Package as zip
        run: |
          V="${{ steps.version.outputs.version }}"
          cd /tmp
          zip -r --symlinks "xbar.${V}.universal.zip" xbar.app
          echo "Created xbar.${V}.universal.zip"
          ls -lh "xbar.${V}.universal.zip"

      - name: Upload universal zip
        uses: actions/upload-artifact@v4
        with:
          name: xbar-${{ steps.version.outputs.version }}-universal
          path: /tmp/xbar.*.universal.zip
          retention-days: 30

      - name: Summary
        run: |
          V="${{ steps.version.outputs.version }}"
          echo "## Build complete 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${V}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Architectures | arm64 (Apple Silicon) + amd64 (Intel) |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`xbar.${V}.universal.zip\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The universal binary runs natively on both Apple Silicon and Intel Macs." >> $GITHUB_STEP_SUMMARY
          echo "To distribute publicly, add code signing and notarisation steps." >> $GITHUB_STEP_SUMMARY
